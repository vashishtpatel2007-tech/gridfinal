<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GridSync AC Controller</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f0f2f5; }
        
        /* The AC Dial Animation */
        .dial-container { transition: all 1s ease-in-out; }
        .temp-text { transition: all 1s ease-in-out; }
        
        /* Eco Mode Green Glow */
        .eco-active {
            box-shadow: 0 0 30px rgba(16, 185, 129, 0.4);
            border-color: #10B981 !important;
        }

        /* Notification Slide Down */
        #notification-banner {
            transform: translateY(-100%);
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #notification-banner.show {
            transform: translateY(0);
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen relative overflow-hidden">

    <div id="notification-banner" class="fixed top-0 left-0 right-0 bg-yellow-500 text-white px-6 py-4 shadow-lg z-50 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <i data-lucide="zap-off" class="w-6 h-6"></i>
            <div>
                <p class="font-bold text-sm">Grid Strain Detected</p>
                <p class="text-xs opacity-90">Optimizing AC to Eco Mode (+ Rewards)</p>
            </div>
        </div>
        <span class="bg-white/20 px-2 py-1 rounded text-xs font-bold">+ ₹5.00</span>
    </div>

    <div class="bg-white w-[380px] h-[750px] rounded-[40px] shadow-2xl border-8 border-gray-900 flex flex-col relative overflow-hidden">
        
        <div class="p-8 flex justify-between items-center">
            <div>
                <h2 class="text-gray-500 text-sm font-medium">Living Room</h2>
                <h1 class="text-2xl font-bold text-gray-800">LG Smart AC</h1>
            </div>
            <div class="bg-green-100 text-green-700 px-3 py-1 rounded-full text-xs font-bold flex items-center gap-1">
                <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                ONLINE
            </div>
        </div>

        <div class="flex-1 flex flex-col items-center justify-center">
            <div id="ac-dial" class="w-64 h-64 rounded-full border-4 border-gray-100 flex items-center justify-center relative dial-container bg-white shadow-inner">
                
                <div class="text-center">
                    <div id="mode-icon" class="mb-2 flex justify-center text-blue-500">
                        <i data-lucide="snowflake" class="w-8 h-8"></i>
                    </div>
                    <div class="text-6xl font-light text-gray-800 flex items-start justify-center ml-4">
                        <span id="temp-display" class="temp-text">20</span>
                        <span class="text-2xl mt-2 text-gray-400">°C</span>
                    </div>
                    <p id="mode-text" class="text-gray-400 text-sm mt-2 font-medium">Cooling Mode</p>
                </div>

            </div>

            <div class="flex gap-8 mt-10 text-gray-400">
                <button class="p-4 rounded-full bg-gray-50 hover:bg-gray-100"><i data-lucide="minus"></i></button>
                <button class="p-4 rounded-full bg-gray-50 hover:bg-gray-100"><i data-lucide="plus"></i></button>
            </div>
        </div>

        <div class="bg-gray-50 p-6 rounded-t-[30px] border-t border-gray-100">
            <div class="flex justify-between items-center mb-4">
                <span class="text-gray-500 text-sm font-medium">GridSync Wallet</span>
                <span class="text-xs text-blue-500 font-bold cursor-pointer">HISTORY</span>
            </div>
            
            <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-yellow-100 rounded-full flex items-center justify-center text-yellow-600">
                        <i data-lucide="coins" class="w-5 h-5"></i>
                    </div>
                    <div>
                        <p class="text-xs text-gray-400">Total Earnings</p>
                        <h3 class="text-xl font-bold text-gray-800">₹ <span id="wallet-balance">45.00</span></h3>
                    </div>
                </div>
                <div id="earning-badge" class="hidden bg-green-500 text-white text-xs px-2 py-1 rounded-lg font-bold animate-bounce">
                    + ₹5.00
                </div>
            </div>
        </div>

    </div>

    <script>
        // Initialize Icons
        lucide.createIcons();

        // Connect to WebSocket
        const ws = new WebSocket("ws://" + window.location.host + "/ws");

        // UI Elements
        const dial = document.getElementById('ac-dial');
        const tempDisplay = document.getElementById('temp-display');
        const modeText = document.getElementById('mode-text');
        const modeIcon = document.getElementById('mode-icon');
        const banner = document.getElementById('notification-banner');
        const walletDisplay = document.getElementById('wallet-balance');
        const earningBadge = document.getElementById('earning-badge');

        ws.onmessage = function(event) {
            const data = JSON.parse(event.data);

            // ⚠️ GRID EVENT TRIGGERED
            if (data.type === "ECO_ACTIVATED") {
                triggerEcoMode(data.new_balance);
            }
        };

        function triggerEcoMode(newBalance) {
            // 1. Show Notification Banner
            banner.classList.add('show');
            setTimeout(() => banner.classList.remove('show'), 5000); // Hide after 5s

            // 2. Change Visuals to ECO (Green)
            dial.classList.add('eco-active'); // Green Glow
            dial.classList.replace('border-gray-100', 'border-green-100');
            
            // 3. Animate Temperature Change (20 -> 24)
            let currentTemp = 20;
            const targetTemp = 24;
            
            const interval = setInterval(() => {
                if (currentTemp < targetTemp) {
                    currentTemp++;
                    tempDisplay.innerText = currentTemp;
                } else {
                    clearInterval(interval);
                }
            }, 300); // Fast but visible animation

            // 4. Update Mode Text
            modeText.innerText = "Eco Saving Active";
            modeText.classList.replace('text-gray-400', 'text-green-600');
            modeIcon.classList.replace('text-blue-500', 'text-green-500');
            modeIcon.innerHTML = '<i data-lucide="leaf" class="w-8 h-8"></i>';
            lucide.createIcons(); // Re-render icon

            // 5. Update Wallet with Animation
            if(newBalance) {
                walletDisplay.innerText = parseFloat(newBalance).toFixed(2);
                earningBadge.classList.remove('hidden'); // Show "+ ₹5.00" popup
            }
        }
    </script>
</body>
</html>
